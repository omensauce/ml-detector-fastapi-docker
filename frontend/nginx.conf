server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy inference API — browser talks same-origin, no CORS needed
    location /predict {
        proxy_pass         http://inference:8000/predict;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
